<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8/3vv/title>
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #fff5f7; font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
            position: relative;
        }

        #main-container { text-align: center; z-index: 10; padding: 40px 20px; width: 100%; max-width: 600px; box-sizing: border-box;}

        .gift-container {
            position: relative; width: 150px; height: 150px;
            margin: 0 auto; cursor: pointer; 
            animation: bounceStrong 2s infinite ease-in-out;
            filter: drop-shadow(0 15px 15px rgba(255, 105, 180, 0.4));
        }

        .gift-box-body { position: absolute; bottom: 0; width: 100%; height: 70%; background: #ff85a1; border-radius: 12px; }
        .gift-box-lid { position: absolute; top: 15%; width: 110%; height: 25%; background: #ff4d79; left: -5%; border-radius: 6px; z-index: 2; }
        .gift-ribbon { position: absolute; left: 50%; transform: translateX(-50%); width: 30px; height: 100%; background: #ffe066; z-index: 1; }
        .gift-bow { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 55px; height: 35px; background: #ffe066; border-radius: 50px; z-index: 3; }

        @keyframes bounceStrong {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.03); }
        }

        #message-container { display: none; opacity: 0; transition: opacity 1.5s ease; }
        h1 { font-size: 2.2rem; color: #d81b60; margin-bottom: 25px; }
        
        #typing-text, #extra-text {
            font-size: 1.25rem; color: #333; line-height: 1.8;
            background: rgba(255, 255, 255, 0.96); padding: 35px;
            border-radius: 30px; box-shadow: 0 15px 40px rgba(255, 182, 193, 0.4);
            text-align: left; border: 2px solid #ffccd5; white-space: pre-wrap;
            margin-bottom: 20px; position: relative; z-index: 10;
        }

        #extra-text { display: none; margin-top: 20px; color: #d81b60; font-weight: bold; border: 2px dashed #ff4d79; }

        .flower { position: fixed; top: -50px; z-index: 5; pointer-events: none; animation: flowerFall linear forwards; }
        @keyframes flowerFall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        .btn-more {
            display: none; opacity: 0; margin: 20px auto 40px; padding: 15px 30px;
            border: none; background: linear-gradient(45deg, #ff4d79, #ff85a1); 
            color: white; border-radius: 50px; cursor: pointer; 
            font-weight: bold; font-size: 1rem;
            box-shadow: 0 8px 15px rgba(255,77,121,0.2);
            transition: all 0.3s;
        }
        .btn-more:active { transform: scale(0.95); }

        .click-heart {
            position: fixed; z-index: 100; pointer-events: none;
            font-size: 2.2rem; 
            animation: heartFloat 2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        @keyframes heartFloat {
            0% { transform: scale(0) translate(0, 0) rotate(0); opacity: 0; }
            15% { opacity: 1; transform: scale(var(--s)) translate(0, 0) rotate(var(--r)); }
            100% { transform: scale(var(--s)) translate(var(--tx), var(--ty)) rotate(calc(var(--r) * 2)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="gift-section">
            <div class="gift-container" onclick="openGift()">
                <div class="gift-bow"></div>
                <div class="gift-box-lid"></div>
                <div class="gift-box-body"><div class="gift-ribbon"></div></div>
            </div>
            <p style="font-size: 1.2rem; color: #ff4d79; font-weight: bold; margin-top: 30px;">Nhấn vào đây!</p>
        </div>

        <div id="message-container">
            <h1>Chúc mừng ngày 8/3! 🌹</h1>
            <div id="typing-text"></div>
            <button id="btn-more" class="btn-more" onclick="showExtra()">Nhấn vào đây để xem thêm</button>
            <div id="extra-text"></div>
        </div>
    </div>

    <script>
        const text = "Nhân dịp 8/3 con chúc mẹ thật nhiều niềm vui và sức khỏe. Con biết lâu nay mẹ đã rất vất vả để nuôi 2 anh em, áp lực rất nhiều... vậy nên con chúc mẹ gặp được nhiều điều may mắn, công việc cũng suông sẻ hơn, tài lộc ngập tràn.\n\nTám tháng ba, nắng hồng tươi\nCon xin kính tặng nụ cười của mẹ\nBấy lâu mẹ chẳng nghỉ ngơi\nSớm khuya vất vả, ngược xuôi tảo tần.\n\nMẹ ơi, trút hết lo âu\nĐể lòng thanh thản, chẳng sầu chẳng lo\nƯớc gì áp lực không còn\nMẹ luôn vui vẻ, tâm hồn thảnh thơi.\n\nChỉ mong sức khỏe rạng ngời\nMẹ luôn hạnh phúc, môi cười thắm tươi\nĐời con có mẹ tuyệt vời\nLà may mắn nhất dưới trời xanh trong. ❤️💝💖🌹";
        
        const extraTextContent = "Con hứa sẽ cố gắng học, nếu không thành tài cũng phải kiếm thật nhiều tiền để cha mẹ không phải lo nữa! 🫰✨";

        let i = 0;
        let j = 0;

        function openGift() {
            const rect = document.querySelector('.gift-container').getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            for(let k=0; k<50; k++) { createSuperHeart(x, y); }

            document.getElementById('gift-section').style.display = 'none';
            document.body.style.background = "linear-gradient(to bottom, #fff0f3, #ffdee9)";
            const msg = document.getElementById('message-container');
            msg.style.display = 'block';
            setTimeout(() => msg.style.opacity = '1', 50);
            setInterval(createFlower, 200); 
            typeWriter();
        }

        function typeWriter() {
            const container = document.getElementById("typing-text");
            const btn = document.getElementById("btn-more");
            if (i < text.length) {
                container.innerHTML += text.charAt(i);
                i++;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                setTimeout(typeWriter, 50);
            } else {
                btn.style.display = "block";
                setTimeout(() => { btn.style.opacity = "1"; }, 300);
            }
        }

        function showExtra() {
            document.getElementById("btn-more").style.display = "none";
            const extraContainer = document.getElementById("extra-text");
            extraContainer.style.display = "block";
            typeWriterExtra();
        }

        function typeWriterExtra() {
            const extraContainer = document.getElementById("extra-text");
            if (j < extraTextContent.length) {
                extraContainer.innerHTML += extraTextContent.charAt(j);
                j++;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                setTimeout(typeWriterExtra, 70);
            }
        }

        function createSuperHeart(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('click-heart');
            const icons = ['❤️', '💖', '💗', '💕', '💓', '✨', '🌹', '🌸'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 250 + 100; 
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist - 100; 
            heart.style.setProperty('--tx', `${tx}px`);
            heart.style.setProperty('--ty', `${ty}px`);
            heart.style.setProperty('--s', Math.random() * 0.8 + 0.6);
            heart.style.setProperty('--r', (Math.random() * 360 - 180) + 'deg');
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            const flowerTypes = ['🌸', '🌹', '🌺', '🌷'];
            flower.innerHTML = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.fontSize = (Math.random() * 15 + 15) + 'px';
            flower.style.animationDuration = (Math.random() * 3 + 6) + 's';
            document.body.appendChild(flower);
            setTimeout(() => flower.remove(), 9000);
        }
    </script>
</body>
</html>
